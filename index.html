<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25级少院5班通知中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
            color: #333;
            font-size: 18px;
        }

        /* 为数字和特定标签使用 Inter 字体 */
        .update-tag,
        .meta-item,
        .deadline,
        .target-text {
            font-family: 'Inter', sans-serif;
            font-variant-numeric: tabular-nums;
        }

        /* 背景淡入，随后水平飘动 */
        #welcome-text {
            position: fixed;
            top: 40%;
            left: 0;
            width: 100%;
            z-index: 9999;
            pointer-events: none;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: flex-start;
            padding-left: 10%;
        }

        .welcome-inner {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
        }

        .welcome-title {
            font-size: 3.8em;
            font-weight: bold;
            color: #333;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin: 0;
            line-height: 1.1;
            animation: welcomeDrift 1.8s ease-in-out both;
        }

        .update-tag {
            font-size: 3.0em;
            font-weight: 600;
            color: #007bff;
            background: none;
            border: none;
            padding: 0;
            box-shadow: none;
            backdrop-filter: none;
            margin: 0;
            letter-spacing: -1px;
            animation: welcomeDrift 1.8s ease-in-out both;
            animation-delay: 0.05s;
        }

        @keyframes welcomeDrift {
            0% {
                opacity: 0;
                transform: translateX(150px);
            }

            25% {
                opacity: 1;
                transform: translateX(0);
            }

            75% {
                opacity: 1;
                transform: translateX(0);
            }

            100% {
                opacity: 0;
                transform: translateX(-150px);
                visibility: hidden;
            }
        }

        /* 内容容器模糊动画 */
        #main-content {
            animation: blurSequence 1.9s forwards;
            opacity: 0;
        }

        @keyframes blurSequence {
            0% {
                filter: blur(20px);
                opacity: 0.3;
            }

            80% {
                filter: blur(20px);
                opacity: 0.3;
            }

            100% {
                filter: blur(0);
                opacity: 1;
            }
        }

        h1 {
            display: none;
        }

        .module-title {
            border-bottom: 2px solid #007bff;
            padding-bottom: 5px;
            margin-top: 30px;
            font-size: 1.5em;
            font-family: 'Inter', sans-serif;
        }

        /* 响应式两列布局 */
        #long-term-container,
        #instant-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) {

            #long-term-container,
            #instant-container {
                grid-template-columns: 1fr;
            }

            #welcome-text {
                padding-left: 5%;
            }

            .welcome-title {
                font-size: clamp(2rem, 11vw, 2.5rem);
                line-height: 1.2;
            }

            body {
                padding: 10px;
            }

            .update-tag {
                font-size: 2.1rem !important;
            }
        }



        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 35px;
            margin-bottom: 5px;
            padding-bottom: 8px;
        }

        .section-header .module-title {
            margin: 0;
            border: none;
            padding: 0;
        }

        .section-update-tag {
            font-family: 'Inter', sans-serif;
            font-size: 0.8em;
            font-weight: 600;
            color: #007bff;
            background: rgba(0, 123, 255, 0.1);
            padding: 3px 12px;
            border-radius: 4px;
            font-variant-numeric: tabular-nums;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
        }

        .card h3 {
            font-size: 1.4em;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .urgent {
            border: 2px solid #dc3545;
            background: #fff5f5;
        }

        .normal {
            border: 2px solid #007bff;
            background: #f0f7ff;
        }

        .normal .deadline {
            color: #007bff;
            font-weight: bold;
            font-size: 1.1em;
        }

        .urgent .deadline {
            color: #dc3545;
            font-weight: bold;
            font-size: 1.1em;
        }

        .expired {
            background: #e9ecef;
            color: #6c757d;
        }

        .expired .meta,
        .expired .meta .target-text,
        .expired .meta .deadline {
            color: #6c757d !important;
        }

        .expired img {
            filter: grayscale(100%);
            opacity: 0.6;
        }

        .meta {
            font-size: 0.95em;
            color: #666;
            margin-bottom: 12px;
            border-bottom: 1px dashed rgba(0, 0, 0, 0.1);
            padding-bottom: 8px;
            display: flex;
            flex-wrap: nowrap;
            gap: 5px;
            align-items: center;
            overflow: hidden;
            width: 100%;
        }

        .meta-sep {
            color: #ddd;
            flex-shrink: 0;
            margin: 0 2px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .meta-label {
            color: #666;
        }

        .target-text {
            font-weight: bold;
            color: #007bff;
        }

        .urgent .target-text {
            color: #dc3545;
        }

        .card p a {
            color: #007bff;
            text-decoration: none;
            word-break: break-all;
        }

        .card p a:hover {
            text-decoration: underline;
        }

        .images {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: auto;
            padding-top: 15px;
        }

        .images img {
            max-width: 180px;
            max-height: 180px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid #ddd;
            cursor: zoom-in;
            transition: transform 0.2s;
        }

        .images img:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        #image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        #image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="welcome-text">
        <div class="welcome-inner">
            <div class="welcome-title">25级少院5班通知中心</div>
            <div id="last-update" class="update-tag">正在获取更新日期...</div>
        </div>
    </div>

    <div id="main-content">
        <div class="section-header">
            <h2 class="module-title">通知</h2>
            <span id="long-term-update" class="section-update-tag"></span>
        </div>
        <div id="long-term-container">加载中...</div>

        <div class="section-header">
            <h2 class="module-title">活动通知</h2>
            <span id="instant-update" class="section-update-tag"></span>
        </div>
        <div id="instant-container">加载中...</div>
    </div>

    <div id="image-modal" onclick="closeModal()">
        <img id="modal-image" src="" alt="放大图片">
    </div>

    <script>
        function openModal(src) {
            document.getElementById('modal-image').src = src;
            document.getElementById('image-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('image-modal').style.display = 'none';
        }

        async function fetchNotifications() {
            try {
                const response = await fetch('./data.json?t=' + new Date().getTime());
                if (!response.ok) return [];
                return await response.json();
            } catch (error) {
                console.error('获取通知失败:', error);
                return [];
            }
        }

        async function render() {
            const notifications = await fetchNotifications();
            const now = new Date();
            let activeNotifs = [];
            let maxLongTerm = 0;
            let maxInstant = 0;

            notifications.forEach(n => {
                const pubTime = new Date(n.publishTime).getTime();
                if (n.type === 'long-term') {
                    if (pubTime > maxLongTerm) maxLongTerm = pubTime;
                } else {
                    if (pubTime > maxInstant) maxInstant = pubTime;
                }

                let status = 'normal', timeText = '', label = '距离截止';
                let diffMs = 0;
                let deadlineTime = null;

                if (!n.deadline) {
                    label = '有效期';
                    timeText = '长期有效';
                } else if (n.deadline === 'TBD') {
                    label = '时间';
                    timeText = '待定';
                    if (n.isUrgent) status = 'urgent';
                } else {
                    deadlineTime = new Date(n.deadline);
                    diffMs = deadlineTime - now;
                    const diffHours = diffMs / (1000 * 60 * 60);
                    if (diffHours < -24) return;

                    if (diffMs < 0) {
                        status = 'expired';
                        label = '已过期';
                        timeText = `${Math.floor(Math.abs(diffHours))}小时前`;
                    } else {
                        // 三天内变红
                        if (diffMs < 3 * 24 * 60 * 60 * 1000) {
                            status = 'urgent';
                        }
                        const d = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                        const h = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const m = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                        timeText = `${d}天 ${h}小时 ${m}分钟`;
                    }
                }
                activeNotifs.push({ ...n, diffMs, status, label, timeText, deadlineTime });
            });

            activeNotifs.sort((a, b) => {
                if (a.status === 'expired' && b.status !== 'expired') return 1;
                if (a.status !== 'expired' && b.status === 'expired') return -1;
                if (a.status !== 'expired') return a.diffMs - b.diffMs;
                return b.deadlineTime - a.deadlineTime;
            });


            document.getElementById('long-term-container').innerHTML = '';
            document.getElementById('instant-container').innerHTML = '';

            activeNotifs.forEach(n => {
                const pubDateObj = new Date(n.publishTime);
                const pubDate = `${pubDateObj.getFullYear()}.${pubDateObj.getMonth() + 1}.${pubDateObj.getDate()} ${pubDateObj.getHours()}:${pubDateObj.getMinutes().toString().padStart(2, '0')}`;

                const imgs = (n.images && n.images.length > 0)
                    ? n.images.map(src => `<img src="${src}" alt="通知配图" loading="lazy" onclick="openModal('${src}')">`).join('')
                    : '';

                const targetText = n.target ? n.target : '全体';

                const html = `
                    <div class="card ${n.status}">
                        <h3>${n.title}</h3>
                        <div class="meta">
                            <span class="meta-item">${pubDate}</span>
                            <span class="meta-sep">|</span>
                            <span class="meta-item"><span class="meta-label">通知对象:</span> <span class="target-text">${targetText}</span></span>
                            <span class="meta-sep">|</span>
                            <span class="meta-item"><span class="meta-label">${n.label}:</span> <span class="deadline">${n.timeText}</span></span>
                        </div>
                        <p style="line-height: 1.6;">${n.content.replace(/\n/g, '<br>').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>')}</p>
                        ${imgs ? `<div class="images">${imgs}</div>` : ''}
                    </div>
                `;
                document.getElementById(n.type === 'long-term' ? 'long-term-container' : 'instant-container').innerHTML += html;
            });

            if (document.getElementById('long-term-container').innerHTML === '') document.getElementById('long-term-container').innerHTML = '<p style="color:#999;">暂无通知</p>';
            if (document.getElementById('instant-container').innerHTML === '') document.getElementById('instant-container').innerHTML = '<p style="color:#999;">暂无通知</p>';

            // 更新分类更新时间
            const formatDate = (ts) => {
                if (!ts) return '';
                const d = new Date(ts);
                return `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;
            };
            if (maxLongTerm) document.getElementById('long-term-update').innerText = `最后更新: ${formatDate(maxLongTerm)}`;
            else document.getElementById('long-term-update').style.display = 'none';

            if (maxInstant) document.getElementById('instant-update').innerText = `最后更新: ${formatDate(maxInstant)}`;
            else document.getElementById('instant-update').style.display = 'none';

            return notifications;
        }

        async function updateLastModified(notifications) {
            const lastUpdateElem = document.getElementById('last-update');
            if (notifications && notifications.length > 0) {
                const timestamps = notifications.map(n => new Date(n.publishTime).getTime()).filter(t => !isNaN(t));
                if (timestamps.length > 0) {
                    const latest = Math.max(...timestamps);
                    const date = new Date(latest);
                    const displayDate = `${date.getFullYear()}.${date.getMonth() + 1}.${date.getDate()}`;
                    lastUpdateElem.innerText = `最后更新: ${displayDate}`;
                } else {
                    lastUpdateElem.style.display = 'none';
                }
            } else {
                lastUpdateElem.style.display = 'none';
            }
        }

        async function init() {
            const notifications = await render();
            updateLastModified(notifications);
        }

        init();
    </script>
</body>

</html>
